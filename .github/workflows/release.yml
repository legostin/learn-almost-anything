name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macos-universal
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            label: windows-x64
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Install sidecar deps
        run: pnpm --dir sidecar install --frozen-lockfile

      # Copy sidecar/ → src-tauri/sidecar/ BEFORE tauri-action runs. The Tauri
      # bundle config has `resources: ["sidecar/**"]` and the cargo build
      # script errors out the moment it can't glob that path, even though the
      # frontend's `beforeBuildCommand` would have populated it. Doing the
      # copy explicitly here removes the timing dependency entirely.
      - name: Stage sidecar for Tauri bundle
        run: pnpm build:sidecar

      # tauri-action runs `pnpm tauri build`, which still invokes the frontend
      # `beforeBuildCommand` (`pnpm build`) for tsc + vite. On tag push it
      # creates a draft GitHub Release with the bundles attached; otherwise it
      # just builds (artifacts uploaded below).
      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'Learn (Almost) Anything ${{ github.ref_name }}'
          releaseBody: |
            Unsigned binaries.

            macOS: right-click → Open the first time (Gatekeeper).
            Windows: SmartScreen will warn — click "More info" → "Run anyway".

            Requires Node.js (≥ 20) installed on the user machine.
            See README for prerequisites (Claude / Codex CLI subscription).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload bundles (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-${{ github.run_number }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
          if-no-files-found: warn
